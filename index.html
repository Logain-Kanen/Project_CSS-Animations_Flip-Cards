<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Card - Functionality</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="icon">😀</div>
                <h2>Hello Explorer!</h2>
                <p>Welcome to the CSS transition page. Click this card and see what happens...</p>
                <div class="hint">Click to flip... obviously</div>
            </div> 

            <div class="card-face card-back">
                <div class="icon">😠</div>
                <h2>You found the other side</h2>
                <p>There's nothing cool back here. Just some text.</p>
                <div class="hint">Click to flip... obviously</div>
            </div> 
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
